<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes">
<title>AnimeHub — شاهد الأنمي أونلاين</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080812;--bg2:#0e0e1a;--bg3:#16162a;--card-bg:#111126;--card-border:rgba(139,92,246,0.06);--card-hover:rgba(139,92,246,0.12);--prim:#8b5cf6;--prim2:#c4b5fd;--prim3:#a78bfa;--sec:#818cf8;--gold:#fbbf24;--grad:linear-gradient(135deg,#8b5cf6,#a78bfa);--grad2:linear-gradient(135deg,#6366f1,#8b5cf6);--text:#f0f0ff;--text2:#a8a8c8;--text3:#6a6a8a;--radius:14px;--radius-sm:10px;--radius-xs:6px;--nav-h:64px;--ease:cubic-bezier(0.16,1,0.3,1);--easeOut:cubic-bezier(0,0,0.2,1);--glow:0 0 40px rgba(139,92,246,0.08);--glowStrong:0 0 60px rgba(139,92,246,0.15)}*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:'Inter','Noto Sans Arabic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;line-height:1.5}#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;width:100%;height:100%}::selection{background:rgba(139,92,246,0.3);color:#fff}::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(139,92,246,0.12);border-radius:20px}

.glass{background:rgba(255,255,255,0.006);backdrop-filter:blur(50px) saturate(1.5);-webkit-backdrop-filter:blur(50px) saturate(1.5);border-bottom:1px solid rgba(255,255,255,0.02)}
.glass-card{background:rgba(255,255,255,0.003);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(139,92,246,0.02);border-radius:var(--radius)}

.glow-border{position:relative}.glow-border::after{content:'';position:absolute;inset:-1px;border-radius:inherit;background:linear-gradient(135deg,rgba(139,92,246,0.08),transparent 50%,rgba(99,102,241,0.05));z-index:-1;opacity:0;transition:opacity .5s var(--ease)}.glow-border:hover::after{opacity:1}
.glow-border-static::after{opacity:1}

.layout-wrap{min-height:100vh}

/* ── Nav ── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);display:flex;align-items:center;justify-content:center;transition:all .3s var(--ease)}
nav.scrolled{background:rgba(8,8,18,0.92);border-bottom:1px solid rgba(139,92,246,0.03)}
.nav-inner{width:100%;max-width:1400px;display:flex;align-items:center;gap:6px;padding:0 12px}
.nav-logo{font-size:1.05em;font-weight:900;white-space:nowrap;text-decoration:none;background:linear-gradient(135deg,#c4b5fd,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex-shrink:0;letter-spacing:-.3px}
.nav-logo span{color:var(--prim3);-webkit-text-fill-color:var(--prim3)}
.nav-browse-btn{display:none;background:rgba(139,92,246,0.04);border:1px solid rgba(139,92,246,0.06);color:var(--prim2);padding:8px 20px;border-radius:var(--radius-sm);font-size:.8em;font-weight:600;cursor:pointer;transition:all .3s var(--ease);white-space:nowrap;flex-shrink:0}
.nav-browse-btn:hover{background:rgba(139,92,246,0.08);border-color:rgba(139,92,246,0.12);color:#fff;transform:translateY(-1px)}
.nav-menu-btn{display:block;background:none;border:none;color:var(--text2);font-size:1.4em;cursor:pointer;padding:4px 8px;line-height:1;margin-right:auto;flex-shrink:0;transition:all .2s}
.nav-menu-btn:hover{color:var(--text)}
.mobile-menu{position:fixed;top:var(--nav-h);left:0;right:0;z-index:99;background:rgba(8,8,18,0.97);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-bottom:1px solid rgba(139,92,246,0.03);padding:8px 12px;animation:slideD .25s var(--ease)}
@keyframes slideD{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.mm-item{display:block;width:100%;background:rgba(139,92,246,0.02);border:1px solid rgba(139,92,246,0.03);color:var(--prim2);padding:12px 16px;border-radius:var(--radius-sm);font-size:.85em;font-weight:600;cursor:pointer;transition:all .25s var(--ease);text-align:right}
.mm-item:hover{background:rgba(139,92,246,0.05);transform:translateX(-4px)}
.mm-item:active{transform:scale(.98)}

/* ── Main ── */
.main{width:100%;max-width:1400px;margin:0 auto;padding:calc(var(--nav-h) + 8px) 12px 28px;position:relative;z-index:2}

/* ── Hero ── */
.hero{padding:18px 0 6px;text-align:center}
.hero-title{font-size:1.7em;font-weight:900;letter-spacing:-.5px;line-height:1.1;margin-bottom:5px;background:linear-gradient(135deg,#c4b5fd,#a78bfa,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:hF .7s var(--ease)}
@keyframes hF{from{opacity:0;transform:translateY(-16px)}}
.hero-sub{font-size:.85em;color:var(--text2);margin-bottom:12px;animation:hF .7s var(--ease) .1s both}
.hero-srch{max-width:100%;margin:0 auto;animation:hF .7s var(--ease) .15s both}
.hero-srch-inner{display:flex;align-items:center;background:rgba(255,255,255,0.01);border:1px solid rgba(139,92,246,0.03);border-radius:var(--radius-sm);padding:3px 3px 3px 16px;transition:all .3s var(--ease)}
.hero-srch-inner:focus-within{border-color:rgba(139,92,246,0.1);background:rgba(255,255,255,0.015);box-shadow:0 0 30px rgba(139,92,246,0.03)}
.hero-srch-inner input{flex:1;border:none;background:none;color:var(--text);font-size:.92em;padding:10px 0;outline:none;direction:rtl;min-width:0}
.hero-srch-inner input::placeholder{color:var(--text3)}
.hero-srch-inner button{border:none;background:var(--grad);color:#fff;padding:8px 18px;border-radius:var(--radius-xs);font-size:.82em;font-weight:700;cursor:pointer;transition:all .3s var(--ease);white-space:nowrap;flex-shrink:0;position:relative;overflow:hidden}
.hero-srch-inner button:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(139,92,246,0.25)}
.hero-srch-inner button:active{transform:scale(.96)}
.hero-badges{display:flex;justify-content:center;gap:6px;margin-top:12px;flex-wrap:wrap;animation:hF .7s var(--ease) .2s both}
.hero-badge{font-size:.63em;color:var(--text2);padding:5px 14px;border-radius:20px;background:rgba(139,92,246,0.02);border:1px solid rgba(139,92,246,0.03);white-space:nowrap;transition:all .3s var(--ease)}
.hero-badge:hover{border-color:rgba(139,92,246,0.06);background:rgba(139,92,246,0.03)}
.hero-badge span{color:var(--prim2);font-weight:700}

/* ── Sections ── */
.sec{margin:20px 0 6px}
.sec-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sec-header h2{font-size:1em;font-weight:800;color:var(--text)}
.sec-badge{font-size:.5em;font-weight:600;background:rgba(139,92,246,0.03);color:var(--prim2);padding:3px 12px;border-radius:30px;border:1px solid rgba(139,92,246,0.03)}

/* ── Scroll Reveal ── */
[data-animate]{opacity:0;transform:translateY(24px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
[data-animate].visible{opacity:1;transform:translateY(0)}
[data-animate-stagger]>*{opacity:0;transform:translateY(16px);transition:opacity .5s var(--easeOut),transform .5s var(--easeOut)}
[data-animate-stagger].visible>*{opacity:1;transform:translateY(0)}
[data-animate-stagger].visible>*:nth-child(1){transition-delay:.03s}
[data-animate-stagger].visible>*:nth-child(2){transition-delay:.06s}
[data-animate-stagger].visible>*:nth-child(3){transition-delay:.09s}
[data-animate-stagger].visible>*:nth-child(4){transition-delay:.12s}
[data-animate-stagger].visible>*:nth-child(5){transition-delay:.15s}
[data-animate-stagger].visible>*:nth-child(6){transition-delay:.18s}
[data-animate-stagger].visible>*:nth-child(7){transition-delay:.21s}
[data-animate-stagger].visible>*:nth-child(8){transition-delay:.24s}
[data-animate-stagger].visible>*:nth-child(9){transition-delay:.27s}
[data-animate-stagger].visible>*:nth-child(10){transition-delay:.3s}
[data-animate-stagger].visible>*:nth-child(11){transition-delay:.33s}
[data-animate-stagger].visible>*:nth-child(12){transition-delay:.36s}
[data-animate-stagger].visible>*:nth-child(13){transition-delay:.39s}
[data-animate-stagger].visible>*:nth-child(14){transition-delay:.42s}
[data-animate-stagger].visible>*:nth-child(15){transition-delay:.45s}
[data-animate-stagger].visible>*:nth-child(16){transition-delay:.48s}
[data-animate-stagger].visible>*:nth-child(17){transition-delay:.51s}
[data-animate-stagger].visible>*:nth-child(18){transition-delay:.54s}

/* ── Cards ── */
.card-row{display:flex;overflow-x:auto;gap:10px;padding:4px 0 12px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.card-row::-webkit-scrollbar{display:none}
.card-row .anime-card{flex:0 0 auto;width:140px;scroll-snap-align:start}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:8px}

.anime-card{position:relative;border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;background:var(--card-bg);border:1px solid var(--card-border);transition:all .4s var(--ease);transform:translateY(0)}
.anime-card:hover{transform:translateY(-6px);border-color:rgba(139,92,246,0.08);box-shadow:var(--glowStrong)}
.anime-card:active{transform:translateY(-2px) scale(.98)}
.anime-card .thumb{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--bg3);transition:transform .6s var(--ease)}
.anime-card:hover .thumb{transform:scale(1.05)}
.anime-card .overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.6) 0%,rgba(0,0,0,0.02) 45%,transparent 100%);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .35s var(--ease)}
.anime-card:hover .overlay,.anime-card:active .overlay{opacity:1}
.anime-card .overlay .play{width:44px;height:44px;border-radius:50%;background:rgba(139,92,246,0.15);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.85em;border:1px solid rgba(255,255,255,0.06);transition:transform .3s var(--ease),background .3s var(--ease);transform:scale(.85)}
.anime-card:hover .overlay .play{transform:scale(1)}
.anime-card .info{padding:8px 10px 10px}
.anime-card .info .title{font-size:.75em;font-weight:700;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.anime-card .info .meta{display:flex;gap:4px;font-size:.55em;color:var(--text2);flex-wrap:wrap}
.anime-card .info .meta span{background:rgba(139,92,246,0.015);padding:2px 8px;border-radius:4px}
.rating{position:absolute;top:8px;left:8px;z-index:2;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:3px 8px;border-radius:6px;font-size:.55em;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:3px}

/* ── Skeleton ── */
.skel-card{border-radius:var(--radius-sm);overflow:hidden;background:rgba(255,255,255,0.003);flex:0 0 auto;width:130px}
.skel-card .img{width:100%;aspect-ratio:2/3;background:linear-gradient(110deg,rgba(17,17,34,0.5) 25%,rgba(255,255,255,0.003) 50%,rgba(17,17,34,0.5) 75%);background-size:200% 100%;animation:shim 1.8s ease-in-out infinite}
.skel-card .l1{height:7px;margin:10px 10px 5px;border-radius:3px;background:linear-gradient(110deg,rgba(17,17,34,0.5) 25%,rgba(255,255,255,0.003) 50%,rgba(17,17,34,0.5) 75%);background-size:200% 100%;animation:shim 1.8s ease-in-out infinite;animation-delay:.1s}
.skel-card .l2{height:5px;width:35%;margin:0 10px 10px;border-radius:3px;background:linear-gradient(110deg,rgba(17,17,34,0.5) 25%,rgba(255,255,255,0.003) 50%,rgba(17,17,34,0.5) 75%);background-size:200% 100%;animation:shim 1.8s ease-in-out infinite;animation-delay:.2s}
@keyframes shim{0%{background-position:200% 0}to{background-position:-200% 0}}

/* ── View Transitions ── */
.view{animation:vIn .5s var(--ease)}
@keyframes vIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.view-out{animation:vOut .3s var(--ease) both}
@keyframes vOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-12px)}}

/* ── Episode View ── */
.ep-hero{display:flex;gap:12px;align-items:flex-start}
.ep-poster{width:110px;flex-shrink:0;border-radius:var(--radius-sm);overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.4);transition:transform .3s var(--ease)}
.ep-poster:hover{transform:scale(1.02)}
.ep-poster img{width:100%;display:block;aspect-ratio:2/3;object-fit:cover;background:var(--bg3);transition:transform .6s var(--ease)}
.ep-info{flex:1;min-width:0}
.ep-info h2{font-size:1.1em;font-weight:800;line-height:1.2}
.ep-meta{display:flex;gap:6px;margin:8px 0;flex-wrap:wrap}
.ep-meta .hero-badge{font-size:.55em;padding:3px 10px;margin:0}

.eps-wrap{background:rgba(255,255,255,0.006);border-radius:var(--radius);border:1px solid rgba(139,92,246,0.02);padding:16px;margin-top:16px}
.eps-top{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.eps-top h2{font-size:1em;font-weight:800}
.eps-count{font-size:.6em;color:var(--text2);background:rgba(139,92,246,0.015);padding:3px 12px;border-radius:20px}
.eps-actions{display:flex;gap:6px}
.eps-actions input{flex:1;padding:9px 12px;border:1px solid rgba(139,92,246,0.03);border-radius:var(--radius-xs);background:rgba(255,255,255,0.006);color:var(--text);font-size:.85em;outline:none;text-align:center;min-width:0;transition:border-color .2s}
.eps-actions input:focus{border-color:rgba(139,92,246,0.08)}
.btn{padding:9px 24px;border:none;border-radius:var(--radius-sm);background:var(--grad);color:#fff;font-size:.82em;font-weight:700;cursor:pointer;transition:all .3s var(--ease);white-space:nowrap;position:relative;overflow:hidden}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(139,92,246,0.25)}
.btn:active{transform:scale(.96);opacity:.9}
.btn-outline{background:transparent;border:1px solid rgba(139,92,246,0.03);color:var(--text2);padding:8px 18px;border-radius:var(--radius-sm);font-size:.78em;cursor:pointer;transition:all .3s var(--ease);font-weight:500}
.btn-outline:hover{border-color:rgba(139,92,246,0.08);color:#fff;background:rgba(139,92,246,0.02)}
.btn-outline:active{transform:scale(.97)}

.eps-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:300px;overflow-y:auto;padding:4px}
.eps-grid::-webkit-scrollbar{width:2px}
.eps-grid::-webkit-scrollbar-thumb{background:rgba(139,92,246,0.08);border-radius:10px}
.ep-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-xs);background:rgba(255,255,255,0.003);cursor:pointer;transition:all .25s var(--ease);border:1px solid transparent}
.ep-item:hover{background:rgba(139,92,246,0.006);border-color:rgba(139,92,246,0.03);transform:translateX(-4px)}
.ep-item:active{transform:scale(.98)}
.ep-num{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:rgba(139,92,246,0.01);font-weight:800;font-size:.65em;flex-shrink:0;color:var(--prim2);border:1px solid rgba(139,92,246,0.015);transition:all .25s var(--ease)}
.ep-item:hover .ep-num{background:rgba(139,92,246,0.03);border-color:rgba(139,92,246,0.04)}
.ep-name{flex:1;font-size:.75em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.ep-arrow{font-size:.55em;opacity:0;transition:all .25s var(--ease);color:var(--prim2)}
.ep-item:hover .ep-arrow{opacity:1;transform:translateX(-4px)}
.no-eps{grid-column:1/-1;text-align:center;padding:24px;color:var(--text3);font-size:.78em}

/* ── Browse ── */
.browse-toolbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin:10px 0 12px}
.browse-select,.browse-input{background:rgba(255,255,255,0.006);color:var(--text2);border:1px solid rgba(139,92,246,0.02);padding:6px 10px;border-radius:var(--radius-xs);font-size:.72em;cursor:pointer;outline:none;transition:all .2s;font-weight:500}
.browse-select:focus,.browse-input:focus{border-color:rgba(139,92,246,0.06)}
.browse-input{color:var(--text);direction:rtl;max-width:120px}
.browse-filters{background:rgba(139,92,246,0.004);border:1px solid rgba(139,92,246,0.02);border-radius:var(--radius);padding:14px;margin-bottom:16px;animation:fadeIn .25s var(--ease)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.filter-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.filter-group{display:flex;flex-direction:column;gap:2px}
.filter-group label{font-size:.55em;color:var(--text2);font-weight:700;letter-spacing:.3px}

.pagination{display:flex;justify-content:center;margin:20px 0 28px}
.pagination-inner{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.005);padding:4px;border-radius:60px;border:1px solid rgba(139,92,246,0.02);flex-wrap:wrap;justify-content:center}
.page-btn{background:none;border:none;color:var(--text2);padding:6px 16px;border-radius:60px;cursor:pointer;font-size:.75em;transition:all .25s var(--ease);font-weight:600}
.page-btn:hover{background:rgba(139,92,246,0.02);color:var(--prim2)}
.page-btn:active{transform:scale(.95)}
.page-current{font-size:.8em;font-weight:800;color:var(--prim2);background:rgba(139,92,246,0.02);padding:4px 12px;border-radius:60px;min-width:26px;text-align:center}

/* ═══════════════════════════════════════
   PLAYER — Fully Revamped
   ═══════════════════════════════════════ */
.player-overlay{position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,0.75);backdrop-filter:blur(50px);-webkit-backdrop-filter:blur(50px);display:flex;align-items:center;justify-content:center}
.player-overlay.show{animation:pIn .35s var(--ease)}
@keyframes pIn{from{opacity:0}to{opacity:1}}
.player-box{width:100%;max-width:960px;background:var(--bg2);border-radius:var(--radius);overflow:hidden;margin:8px;box-shadow:0 0 100px rgba(0,0,0,.5),0 0 200px rgba(139,92,246,0.05);border:1px solid rgba(139,92,246,0.03)}
.player-box.show{animation:pB .4s var(--ease)}
@keyframes pB{from{opacity:0;transform:scale(.93) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}

.player-top{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.015)}
.player-top span{font-size:.78em;color:var(--text2);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-close{background:none;border:none;color:var(--text2);font-size:1.3em;cursor:pointer;padding:0 10px;line-height:1;transition:all .2s;border-radius:6px}
.player-close:hover{color:#fff;background:rgba(255,255,255,0.02)}
.player-close:active{transform:scale(.92)}
.player-wrap{position:relative;width:100%;background:#000;aspect-ratio:16/9}
.player-wrap iframe{width:100%;height:100%;display:block;background:#000;border:none}



/* Server error overlay */
.srv-error-overlay{position:absolute;inset:0;z-index:25;background:rgba(0,0,0,0.8);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;pointer-events:none;transition:opacity .3s var(--ease)}
.srv-error-overlay.show{opacity:1;pointer-events:auto}
.srv-error-overlay p{color:var(--text2);font-size:.78em;font-weight:500}
.srv-error-overlay .try-btn{background:var(--grad);border:none;color:#fff;padding:10px 28px;border-radius:var(--radius-sm);font-size:.82em;font-weight:700;cursor:pointer;transition:all .3s var(--ease)}
.srv-error-overlay .try-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(139,92,246,0.25)}

/* ── Loading / Toast / Scroll Top ── */
.loading{position:fixed;inset:0;z-index:2000;background:rgba(5,5,10,0.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;justify-content:center}
.loading.show{animation:pIn .25s var(--ease)}

<body>

<canvas id="bgCanvas"></canvas>

<div class="layout-wrap">
<nav id="nav" class="glass">

      <select id="bsort" class="browse-select"><option value="latest_first">الأحدث</option><option value="oldest_first">الأقدم</option><option value="name_az">الاسم أ-ي</option><option value="name_za">الاسم ي-أ</option><option value="rating">التقييم</option></select>

    <div id="bfilters" class="hidden browse-filters">
      <div class="filter-row">

        <div class="filter-group"><label>النوع</label><select id="ftype" class="browse-select"><option value="">الكل</option><option value="TV">TV</option><option value="Movie">فيلم</option><option value="ONA">ONA</option><option value="OVA">OVA</option><option value="Special">Special</option></select></div>
        <div class="filter-group"><label>الحالة</label><select id="fstat" class="browse-select"><option value="">الكل</option><option value="Currently Airing">يعرض الآن</option><option value="Finished Airing">مكتمل</option></select></div>
        <div class="filter-group"><label>السنة</label><select id="fyear" class="browse-select"><option value="">الكل</option><option value="2027">2027</option><option value="2026">2026</option><option value="2025">2025</option><option value="2024">2024</option><option value="2023">2023</option><option value="2022">2022</option><option value="2021">2021</option><option value="2020">2020</option><option value="2010s">2010-2019</option><option value="2000s">2000-2009</option><option value="older">أقدم</option></select></div>

<!-- ═══════ PLAYER ═══════ -->

<div id="loading" class="loading hidden"><div class="spin"></div><p>جاري التحميل...</p></div>
<div id="toast" class="toast hidden"></div>
<button id="stop" class="scroll-top">↑</button>

<script>
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
const isSmallScreen = window.innerWidth < 768;

/* ── Background Canvas ── */
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [], stars = [];
let animId = null;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

if (!isMobile) {
  class Star {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.sz = Math.random() * 1.2 + 0.2;
      this.o = Math.random() * 0.4 + 0.1;
      this.phase = Math.random() * Math.PI * 2;
      this.speed = Math.random() * 0.003 + 0.001;
    }
  }

  class P {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.sz = Math.random() * 2.5 + 0.5;
      this.sx = (Math.random() - 0.5) * 0.2;
      this.sy = -(Math.random() * 0.15 + 0.03);
      this.o = Math.random() * 0.5 + 0.1;
      this.drift = Math.random() * 3;
      this.phase = Math.random() * Math.PI * 2;
      this.hue = Math.random() * 80 + 230;
      this.pulse = Math.random() * 0.02 + 0.01;
    }
  }

  const N = Math.min(100, Math.floor((W * H) / 16000));
  const SN = Math.min(80, Math.floor((W * H) / 25000));
  for (let i = 0; i < N; i++) particles.push(new P());
  for (let i = 0; i < SN; i++) stars.push(new Star());

  function drawParticles(t) {
    ctx.clearRect(0, 0, W, H);
    for (const s of stars) {
      const twinkle = 0.3 + 0.7 * Math.abs(Math.sin(t * s.speed + s.phase));
      ctx.globalAlpha = s.o * twinkle * 0.5;
      ctx.fillStyle = '#e0e0ff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.sz, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 6;
    ctx.shadowColor = 'rgba(139,92,246,0.3)';
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      p.x += p.sx + Math.sin(t * 0.0003 + p.drift) * 0.15;
      p.y += p.sy;
      const brightness = 0.4 + 0.6 * Math.abs(Math.sin(t * p.pulse * 2 + p.phase));
      ctx.globalAlpha = p.o * brightness;
      ctx.shadowBlur = 8 + brightness * 6;
      ctx.shadowColor = 'hsla(' + p.hue + ', 80%, 60%, 0.4)';
      ctx.fillStyle = 'hsl(' + p.hue + ', 90%, ' + (50 + brightness * 30) + '%)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.sz * (0.8 + brightness * 0.2), 0, Math.PI * 2);
      ctx.fill();
      for (let j = i + 1; j < particles.length; j++) {
        const p2 = particles[j];
        const dx = p.x - p2.x;
        const dy = p.y - p2.y;
        const dist = dx * dx + dy * dy;
        if (dist < 30000) {
          const alpha = (1 - dist / 30000) * 0.15 * brightness;
          ctx.globalAlpha = alpha;
          ctx.shadowBlur = 0;
          ctx.strokeStyle = 'hsla(' + ((p.hue + p2.hue) / 2) + ', 70%, 60%, 0.5)';
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.stroke();
        }
      }
      if (p.y < -10 || p.x < -10 || p.x > W + 10) p.reset();
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    animId = requestAnimationFrame(drawParticles);
  }
  drawParticles(0);
} else {
  canvas.style.display = 'none';
}

/* ── DOM refs ── */
const $ = id => document.getElementById(id);
const si = $('si'), sb = $('sb');

const home = $('home'), sv = $('searchView'), sg = $('sg'), sc = $('sc');
const bv = $('browseView'), bg = $('bg'), bc = $('bc'), bp = $('bp');
const ev = $('epView'), en = $('ename'), ec1 = $('ec1'), ec2 = $('ec2'), el = $('elist'), epInp = $('epInp');
const backBtn = $('backBtn'), watchBtn = $('watchBtn'), sec = $('sections');
const ov = $('player'), ifr = $('ifr'), pt = $('ptitle'), pc = $('pclose');
const srvErr = $('srvErr'), srvErrMsg = $('srvErrMsg'), srvRetry = $('srvRetry');
const to = $('toast'), ld = $('loading'), stp = $('stop');
const nav = $('nav');

let slug = null, animeName = '', eps = [], urls = [], timer = null, bPage = 1;
let _inPopState = false;
let _currentSrvIdx = 0;
let _fakeRetries = 0;
const MAX_FAKE_RETRIES = 5;

window.addEventListener('scroll', () => {
  const y = window.scrollY;
  nav.classList.toggle('scrolled', y > 30);
  stp.classList.toggle('show', y > 400);
});
stp.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

window.addEventListener('popstate', (e) => {
  const validViews = ['home','searchView','browseView','epView'];
  const targetId = (e.state && e.state.viewId && validViews.includes(e.state.viewId))
    ? e.state.viewId : 'home';
  if (!targetId) return;
  const targetView = $(targetId);
  if (targetView && !targetView.classList.contains('hidden')) return;
  _inPopState = true;
  showView(targetView);
  _inPopState = false;
});

function toast(msg, t = 'err') {
  to.textContent = msg;
  to.className = 'toast ' + t + ' show';
  clearTimeout(to._h);
  to._h = setTimeout(() => to.classList.remove('show'), 3500);
}
function ldShow() { ld.classList.remove('hidden'); ld.classList.add('show'); }
function ldHide() { ld.classList.add('hidden'); ld.classList.remove('show'); }

const obs = new IntersectionObserver(ents => {
  ents.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.06 });
function ob(el) { el && obs.observe(el); }

function card(it, d = 0) {
  const img = it.image || '';
  const t = it.title || '?';
  const tp = it.type || 'أنمي';
  const yr = it.year || '';
  const r = it.rating ? parseFloat(it.rating).toFixed(1) : null;
  const s = it.slug || '';
  const fb = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 280'%3E%3Crect fill='%23131324' width='200' height='280'/%3E%3Ctext x='100' y='140' text-anchor='middle' fill='%2394a3b8' font-size='24'%3E${t.charAt(0)}%3C/text%3E%3C/svg%3E`;
  return `<div class="anime-card glow-border" onclick="pick('${s}','${img.replace(/'/g,"\\'")}','${t.replace(/'/g,"\\'")}','${tp}','${yr}','${r||''}')" data-animate-item>
    <img class="thumb" src="${img}" alt="${t}" loading="lazy" onerror="this.src='${fb}'">
    <div class="overlay"><span class="play">▶</span></div>
    ${r ? `<div class="rating">${r}</div>` : ''}
    <div class="info"><div class="title">${t}</div><div class="meta"><span>${tp}</span>${yr ? `<span>${yr}</span>` : ''}</div></div>
  </div>`;
}

function skel(n = 8) {
  return '<div class="card-row">' + Array(n).fill('<div class="skel-card"><div class="img"></div><div class="l1"></div><div class="l2"></div></div>').join('') + '</div>';
}

function showView(v) {
  [home, sv, bv, ev].forEach(x => x.classList.add('hidden'));
  v.classList.remove('hidden');
  v.classList.remove('view');
  void v.offsetWidth;
  v.classList.add('view');
  if (!_inPopState && v.id !== 'home') {
    history.pushState({ viewId: v.id }, '');
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function loadHome() {
  sec.innerHTML = '<div class="sec"><div class="sec-header"><h2>جاري التحميل...</h2></div>' + skel(8) + '</div>';
  const ft = setTimeout(() => {
    sec.innerHTML = '<div class="err-state">جاري تحميل المحتوى... يرجى الانتظار</div>';
  }, 8000);
  fetch('/api/homepage').then(r => r.json()).then(d => {
    clearTimeout(ft);
    sec.innerHTML = '';
    const sections = Array.isArray(d) ? d : [];
    let hasAny = false;
    sections.forEach((s, si) => {
      const items = s.items;
      if (!items || !items.length) return;
      hasAny = true;
      const el = document.createElement('section');
      el.className = 'sec'; el.setAttribute('data-animate','');
      el.setAttribute('data-animate-stagger','');
      el.innerHTML = `<div class="sec-header"><h2>${s.label}</h2><span class="sec-badge">${items.length}</span></div>
        <div class="card-row">${items.map((x,i) => card(x,i*35)).join('')}</div>`;
      sec.appendChild(el);
      ob(el);
    });
    if (!hasAny) sec.innerHTML = '<div class="err-state">لا توجد بيانات متاحة</div>';
  }).catch(() => { clearTimeout(ft); sec.innerHTML = '<div class="err-state">تعذر التحميل</div>'; });
}

function doSearch(q) {
  if (!q) { toast('أدخل اسم الأنمي'); return; }
  ldShow();
  fetch('/api/search', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title:q}) })
    .then(r => r.json()).then(d => {
      ldHide();
      if (d.found && d.results.length) {
        showView(sv); sc.textContent = d.results.length;
        sg.innerHTML = d.results.map((x,i) => card(x,i*35)).join('');
      } else {
        showView(sv); sg.innerHTML = '<div class="err-state">لا توجد نتائج</div>'; sc.textContent = '0';
      }
    }).catch(() => { ldHide(); toast('خطأ في الاتصال'); });
}

sb.addEventListener('click', () => doSearch(si.value.trim()));
si.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(si.value.trim()); });

const bBtn = $('browseBtn'), brf = $('brf'), bsort = $('bsort'), bkw = $('bkw');
const bfbtn = $('bfbtn'), bf = $('bfilters'), fseason = $('fseason'), ftype = $('ftype');
const fstat = $('fstat'), fyear = $('fyear'), fap = $('fap'), fres = $('fres');

const menuBtn = $('menuBtn'), mobileMenu = $('mobileMenu'), mmBrowse = $('mmBrowse');
menuBtn.addEventListener('click', () => {
  mobileMenu.classList.toggle('hidden');
  menuBtn.textContent = mobileMenu.classList.contains('hidden') ? '☰' : '✕';
});
mobileMenu.addEventListener('click', e => { if (e.target.tagName === 'BUTTON') { mobileMenu.classList.add('hidden'); menuBtn.textContent = '☰'; } });
document.addEventListener('click', e => { if (!e.target.closest('nav')) { mobileMenu.classList.add('hidden'); if(menuBtn) menuBtn.textContent = '☰'; } });
mmBrowse.addEventListener('click', () => loadBrowse(1));

bBtn.addEventListener('click', () => loadBrowse(1));
brf.addEventListener('click', () => loadBrowse(bPage));
bsort.addEventListener('change', () => loadBrowse(1));
bkw.addEventListener('keydown', e => { if (e.key === 'Enter') loadBrowse(1); });
bfbtn.addEventListener('click', () => bf.classList.toggle('hidden'));
fap.addEventListener('click', () => loadBrowse(1));
fres.addEventListener('click', () => { fseason.value = ftype.value = fstat.value = fyear.value = ''; bkw.value = ''; loadBrowse(1); });

function loadBrowse(p) {
  bPage = p; ldShow();
  const q = new URLSearchParams({ page: p, order_by: bsort.value });
  if (bkw.value.trim()) q.set('keyword', bkw.value.trim());
  if (fseason.value) q.set('season', fseason.value);
  if (ftype.value) q.set('type', ftype.value);
  if (fstat.value) q.set('status', fstat.value);
  if (fyear.value) q.set('year', fyear.value);
  fetch('/api/browse?'+q).then(r=>r.json()).then(d => {
    ldHide();
    if (d.success) {
      showView(bv); bc.textContent = d.total_min || (d.data||[]).length;
      bg.innerHTML = (d.data||[]).map((x,i) => card({ title: x.anime_name, slug: x.slug, image: x.anime_cover_image_url, type: x.anime_type, year: x.anime_release_year, rating: x.anime_rating }, i*30)).join('');
      bp.innerHTML = '';
      if (d.has_next || d.has_prev) {
        const w = document.createElement('div'); w.className = 'pagination-inner';
        if (d.has_prev) { const b = document.createElement('button'); b.className='page-btn'; b.textContent='← السابق'; b.onclick=()=>loadBrowse(p-1); w.appendChild(b); }
        const c = document.createElement('span'); c.className='page-current'; c.textContent=p; w.appendChild(c);
        if (d.has_next) { const b = document.createElement('button'); b.className='page-btn'; b.textContent='التالي →'; b.onclick=()=>loadBrowse(p+1); w.appendChild(b); }
        bp.appendChild(w);
      }
    } else toast(d.error||'فشل');
  }).catch(() => { ldHide(); toast('خطأ'); });
}

function pick(s, img, title, tp, yr, rt) {
  slug = s; animeName = ''; ldShow();
  window._animeMeta = { image: img || '', title: title || '', type: tp || '', year: yr || '', rating: rt || '' };
  let timedOut = false;
  const ft = setTimeout(() => { timedOut = true; toast('الخادم يستغرق وقتاً طويلاً، جرب تاني'); }, 12000);
  fetch('/api/episodes', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({slug:s}) })
    .then(r=>r.json()).then(d => {
      clearTimeout(ft);
      if (timedOut) return;
      ldHide();
      if (d.found) { eps = d.episodes||[]; animeName = d.name||''; if (d.slug) slug = d.slug; showEps(); }
      else toast(d.message||'تعذر التحميل');
    }).catch(() => { clearTimeout(ft); ldHide(); toast('خطأ'); });
}

function showEps() {
  const name = animeName || slug.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  showView(ev);
  const meta = window._animeMeta || {};
  en.textContent = name;
  $('epImg').src = meta.image || '';
  $('epImg').alt = name;
  $('epType').textContent = '\uD83D\uDCFA ' + (meta.type || 'أنمي');
  $('epYear').textContent = '\uD83D\uDCC5 ' + (meta.year || '--');
  $('epRating').textContent = '\u2B50 ' + (meta.rating || '--');
  ec1.textContent = (eps.length||'?')+' حلقة'; ec2.textContent = eps.length||'0';
  if (!eps.length) { el.innerHTML = '<div class="no-eps">لا توجد حلقات</div>'; return; }
  el.innerHTML = eps.map((e,i) => { const en = e.n || e.number || e.episode_number || e.num || e.episode || (i+1); return `<div class="ep-item" onclick="playEp(${en})"><span class="ep-num">${en}</span><span class="ep-name">${e.title||'حلقة '+en}</span><span class="ep-arrow">▶</span></div>`; }).join('');
  epInp.max = eps.length;
}

backBtn.addEventListener('click', () => { history.back(); });
watchBtn.addEventListener('click', () => playEp());
epInp.addEventListener('keydown', e => { if (e.key === 'Enter') playEp(); });

function playEp(ep) {
  const n = ep || parseInt(epInp.value);
  if (!n || n<1) { toast('رقم صحيح'); return; }
  if (!slug) { toast('اختر أنمي'); return; }
  ldShow(); srvErr.classList.remove('show');
  let timedOut = false;
  const ft = setTimeout(() => { timedOut = true; toast('جلب الرابط يستغرق وقتاً، جرب تاني'); }, 15000);
  fetch('/api/play', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({slug, episode:n}) })
    .then(r=>r.json()).then(d => {
      clearTimeout(ft);
      if (timedOut) return;
      ldHide();
      if (d.found && d.urls.length) { urls = d.urls; _currentSrvIdx = 0; openS(0); }
      else toast(d.message||'لا توجد روابط');
    }).catch(() => { clearTimeout(ft); ldHide(); toast('خطأ'); });
}

/* ── Auto server switch ── */
function openS(idx) {
  if (idx >= urls.length) { toast('كل السيرفرات متعطلة'); closeP(); return; }
  _currentSrvIdx = idx;
  clearTimeout(timer);
  srvErr.classList.remove('show');
  
  const e = urls[idx];
  const pName = animeName || slug.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  pt.textContent = pName + ' — ' + e.server;
  ov.classList.remove('hidden'); ov.classList.add('show');
  $('pbox').classList.remove('hidden'); $('pbox').classList.add('show');
  
  ifr.src = e.url;
  
  // Auto-switch on timeout (15s) or iframe error
  clearTimeout(timer);
  timer = setTimeout(() => autoNextSrv('لم يتم التحميل'), 15000);
}

function autoNextSrv(reason) {
  if (_fakeRetries >= MAX_FAKE_RETRIES) { toast('كل السيرفرات متعطلة'); closeP(); return; }
  _fakeRetries++;
  clearTimeout(timer);
  ifr.src = '';
  toast('⚠ ' + reason + ' — جرب سيرفر تاني...', 'err');
  setTimeout(() => openS(_currentSrvIdx + 1), 1200);
}

// If iframe loads, cancel the timeout (page loaded)
ifr.addEventListener('load', () => { clearTimeout(timer); });

// If iframe errors, auto-advance
ifr.addEventListener('error', () => { autoNextSrv('خطأ في السيرفر'); });

pc.addEventListener('click', closeP);

function closeP() {
  ifr.src = '';
  ov.classList.remove('show'); ov.classList.add('hidden');
  $('pbox').classList.add('hidden');
  $('pbox').classList.remove('show');
  clearTimeout(timer);
  srvErr.classList.remove('show');
  if (document.fullscreenElement) document.exitFullscreen?.();
}

srvRetry.addEventListener('click', () => {
  srvErr.classList.remove('show');
  openS(_currentSrvIdx + 1);
});

document.addEventListener('DOMContentLoaded', loadHome);
</script>
</body>
</html>
