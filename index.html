<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes">
<title>AnimeHub — شاهد الأنمي أونلاين</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080812;--bg2:#0e0e1a;--bg3:#16162a;--card-bg:#111126;--card-border:rgba(139,92,246,0.06);--card-hover:rgba(139,92,246,0.12);--prim:#8b5cf6;--prim2:#c4b5fd;--prim3:#a78bfa;--sec:#818cf8;--gold:#fbbf24;--grad:linear-gradient(135deg,#8b5cf6,#a78bfa);--grad2:linear-gradient(135deg,#7c3aed,#8b5cf6,#a78bfa);--text:#f0f0ff;--text2:#a8a8c8;--text3:#6a6a8a;--radius:14px;--radius-sm:10px;--radius-xs:6px;--nav-h:64px;--ease:cubic-bezier(0.16,1,0.3,1);--ease-spring:cubic-bezier(0.34,1.56,0.64,1);--ease-out:cubic-bezier(0,0,0.2,1)}*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:'Inter','Noto Sans Arabic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;line-height:1.5}#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;width:100%;height:100%}::selection{background:rgba(139,92,246,0.3);color:#fff}::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(139,92,246,0.12);border-radius:20px}.glass-lg{background:rgba(255,255,255,0.006);backdrop-filter:blur(50px) saturate(1.5);-webkit-backdrop-filter:blur(50px) saturate(1.5);border-bottom:1px solid rgba(255,255,255,0.02)}.glow-border{position:relative;transition:transform .45s var(--ease),box-shadow .45s var(--ease)}.glow-border::after{content:'';position:absolute;inset:-1px;border-radius:inherit;background:linear-gradient(135deg,rgba(139,92,246,0.08),transparent 50%,rgba(99,102,241,0.05));z-index:-1;opacity:0;transition:opacity .45s var(--ease)}.glow-border:hover::after{opacity:1}.glow-border:hover{transform:translateY(-6px);box-shadow:0 12px 40px rgba(139,92,246,0.08)}

/* ── Base (Mobile First < 481px) ── */
.layout-wrap{min-height:100vh}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);display:flex;align-items:center;justify-content:center;transition:all .4s var(--ease)}
nav.scrolled{background:rgba(8,8,18,0.92);border-bottom:1px solid rgba(139,92,246,0.03)}
.nav-inner{width:100%;max-width:1400px;display:flex;align-items:center;gap:6px;padding:0 12px}
.nav-logo{font-size:1.05em;font-weight:900;white-space:nowrap;text-decoration:none;background:linear-gradient(135deg,#c4b5fd,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex-shrink:0}
.nav-browse-btn{display:none;background:rgba(139,92,246,0.04);border:1px solid rgba(139,92,246,0.06);color:var(--prim2);padding:8px 20px;border-radius:var(--radius-sm);font-size:.8em;font-weight:600;cursor:pointer;transition:all .3s var(--ease);white-space:nowrap;flex-shrink:0}
.nav-browse-btn:hover{background:rgba(139,92,246,0.08);border-color:rgba(139,92,246,0.12);color:#fff}
.nav-menu-btn{display:block;background:none;border:none;color:var(--text2);font-size:1.4em;cursor:pointer;padding:4px 8px;line-height:1;margin-right:auto;flex-shrink:0;transition:color .2s}
.nav-menu-btn:hover{color:var(--text)}
.mobile-menu{position:fixed;top:var(--nav-h);left:0;right:0;z-index:99;background:rgba(8,8,18,0.97);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-bottom:1px solid rgba(139,92,246,0.03);padding:8px 12px;animation:slideD .25s var(--ease-spring)}
@keyframes slideD{from{opacity:0;transform:translateY(-12px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.mm-item{display:block;width:100%;background:rgba(139,92,246,0.02);border:1px solid rgba(139,92,246,0.03);color:var(--prim2);padding:12px 16px;border-radius:var(--radius-sm);font-size:.85em;font-weight:600;cursor:pointer;transition:all .25s var(--ease);text-align:right}
.mm-item:active{background:rgba(139,92,246,0.06)}

.main{width:100%;max-width:1400px;margin:0 auto;padding:calc(var(--nav-h) + 8px) 12px 28px;position:relative;z-index:2}

.hero{padding:18px 0 6px;text-align:center}
.hero-title{font-size:1.7em;font-weight:900;letter-spacing:-.5px;line-height:1.1;margin-bottom:5px;background:linear-gradient(135deg,#c4b5fd,#a78bfa,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:hF .7s var(--ease-spring)}
@keyframes hF{from{opacity:0;transform:translateY(-20px) scale(.95)}}
.hero-sub{font-size:.85em;color:var(--text2);margin-bottom:12px;animation:hF .7s var(--ease-spring) .1s both}
.hero-srch{max-width:100%;margin:0 auto;animation:hF .7s var(--ease-spring) .15s both}
.hero-srch-inner{display:flex;align-items:center;background:rgba(255,255,255,0.01);border:1px solid rgba(139,92,246,0.03);border-radius:var(--radius-sm);padding:3px 3px 3px 16px;transition:all .4s var(--ease)}
.hero-srch-inner:focus-within{border-color:rgba(139,92,246,0.12);background:rgba(255,255,255,0.015);box-shadow:0 0 30px rgba(139,92,246,0.04)}
.hero-srch-inner input{flex:1;border:none;background:none;color:var(--text);font-size:.92em;padding:10px 0;outline:none;direction:rtl;min-width:0}
.hero-srch-inner input::placeholder{color:var(--text3)}
.hero-srch-inner button{border:none;background:var(--grad);color:#fff;padding:8px 18px;border-radius:var(--radius-xs);font-size:.82em;font-weight:700;cursor:pointer;transition:all .3s var(--ease);white-space:nowrap;flex-shrink:0;position:relative;overflow:hidden}
.hero-srch-inner button:active{transform:scale(.96)}
.hero-srch-inner button::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.1);opacity:0;transition:opacity .3s}
.hero-srch-inner button:hover::after{opacity:1}
.hero-badges{display:flex;justify-content:center;gap:6px;margin-top:12px;flex-wrap:wrap;animation:hF .7s var(--ease-spring) .2s both}
.hero-badge{font-size:.63em;color:var(--text2);padding:5px 14px;border-radius:20px;background:rgba(139,92,246,0.02);border:1px solid rgba(139,92,246,0.03);white-space:nowrap;transition:all .3s var(--ease)}
.hero-badge:hover{background:rgba(139,92,246,0.05);border-color:rgba(139,92,246,0.08);transform:translateY(-2px)}
.hero-badge span{color:var(--prim2);font-weight:700}

.sec{margin:20px 0 6px}
.sec-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sec-header h2{font-size:1em;font-weight:800;color:var(--text)}
.sec-badge{font-size:.5em;font-weight:600;background:rgba(139,92,246,0.03);color:var(--prim2);padding:3px 12px;border-radius:30px;border:1px solid rgba(139,92,246,0.03)}
[data-animate]{opacity:0;transform:translateY(30px);transition:opacity .7s var(--ease-spring),transform .7s var(--ease-spring)}
[data-animate].visible{opacity:1;transform:translateY(0)}

.card-row{display:flex;overflow-x:auto;gap:10px;padding:4px 0 12px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.card-row::-webkit-scrollbar{display:none}
.card-row .anime-card{flex:0 0 auto;width:140px;scroll-snap-align:start}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:8px}

.anime-card{position:relative;border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;background:var(--card-bg);border:1px solid var(--card-border);transition:all .4s var(--ease);transform:translateY(0)}
.anime-card:active{transform:translateY(-4px);border-color:rgba(139,92,246,0.08)}
.anime-card .thumb{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--bg3);transition:transform .5s var(--ease)}
.anime-card:hover .thumb{transform:scale(1.05)}
.anime-card .overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.55) 0%,rgba(0,0,0,0.02) 45%,transparent 100%);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .35s var(--ease)}
.anime-card:hover .overlay,.anime-card:active .overlay{opacity:1}
.anime-card .overlay .play{width:44px;height:44px;border-radius:50%;background:rgba(139,92,246,0.15);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.85em;border:1px solid rgba(255,255,255,0.06);transition:transform .35s var(--ease-spring),box-shadow .35s var(--ease);transform:scale(.8)}
.anime-card:hover .overlay .play{transform:scale(1);box-shadow:0 0 30px rgba(139,92,246,0.2)}
.anime-card .info{padding:8px 10px 10px}
.anime-card .info .title{font-size:.75em;font-weight:700;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.anime-card .info .meta{display:flex;gap:4px;font-size:.55em;color:var(--text2);flex-wrap:wrap}
.anime-card .info .meta span{background:rgba(139,92,246,0.015);padding:2px 8px;border-radius:4px}
.rating{position:absolute;top:8px;left:8px;z-index:2;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:3px 8px;border-radius:6px;font-size:.55em;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:3px}

.skel-card{border-radius:var(--radius-sm);overflow:hidden;background:rgba(255,255,255,0.003);flex:0 0 auto;width:130px}
.skel-card .img{width:100%;aspect-ratio:2/3;background:linear-gradient(110deg,rgba(17,17,34,0.5) 25%,rgba(255,255,255,0.003) 50%,rgba(17,17,34,0.5) 75%);background-size:200% 100%;animation:shim 1.8s ease-in-out infinite}
.skel-card .l1{height:7px;margin:10px 10px 5px;border-radius:3px;background:linear-gradient(110deg,rgba(17,17,34,0.5) 25%,rgba(255,255,255,0.003) 50%,rgba(17,17,34,0.5) 75%);background-size:200% 100%;animation:shim 1.8s ease-in-out infinite;animation-delay:.1s}
.skel-card .l2{height:5px;width:35%;margin:0 10px 10px;border-radius:3px;background:linear-gradient(110deg,rgba(17,17,34,0.5) 25%,rgba(255,255,255,0.003) 50%,rgba(17,17,34,0.5) 75%);background-size:200% 100%;animation:shim 1.8s ease-in-out infinite;animation-delay:.2s}
@keyframes shim{0%{background-position:200% 0}to{background-position:-200% 0}}

.view{animation:vIn .5s var(--ease-spring)}
@keyframes vIn{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}

.ep-hero{display:flex;gap:12px;align-items:flex-start}
.ep-poster{width:110px;flex-shrink:0;border-radius:var(--radius-sm);overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.4)}
.ep-poster img{width:100%;display:block;aspect-ratio:2/3;object-fit:cover;background:var(--bg3)}
.ep-info{flex:1;min-width:0}
.ep-info h2{font-size:1.1em;font-weight:800;line-height:1.2}
.ep-meta{display:flex;gap:6px;margin:8px 0;flex-wrap:wrap}
.ep-meta .hero-badge{font-size:.55em;padding:3px 10px;margin:0}

.eps-wrap{background:rgba(255,255,255,0.006);border-radius:var(--radius);border:1px solid rgba(139,92,246,0.02);padding:16px;margin-top:16px}
.eps-top{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.eps-top h2{font-size:1em;font-weight:800}
.eps-count{font-size:.6em;color:var(--text2);background:rgba(139,92,246,0.015);padding:3px 12px;border-radius:20px}
.eps-actions{display:flex;gap:6px}
.eps-actions input{flex:1;padding:9px 12px;border:1px solid rgba(139,92,246,0.03);border-radius:var(--radius-xs);background:rgba(255,255,255,0.006);color:var(--text);font-size:.85em;outline:none;text-align:center;min-width:0;transition:border-color .3s var(--ease)}
.eps-actions input:focus{border-color:rgba(139,92,246,0.08)}
.btn{padding:9px 24px;border:none;border-radius:var(--radius-sm);background:var(--grad2);color:#fff;font-size:.82em;font-weight:700;cursor:pointer;transition:all .3s var(--ease);white-space:nowrap;position:relative;overflow:hidden}
.btn:active{transform:scale(.96);opacity:.9}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.08);opacity:0;transition:opacity .3s}
.btn:hover::after{opacity:1}
.btn-outline{background:transparent;border:1px solid rgba(139,92,246,0.03);color:var(--text2);padding:8px 18px;border-radius:var(--radius-sm);font-size:.78em;cursor:pointer;transition:all .3s var(--ease);font-weight:500}
.btn-outline:active{border-color:rgba(139,92,246,0.08);color:#fff}

.eps-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:300px;overflow-y:auto;padding:4px}
.ep-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-xs);background:rgba(255,255,255,0.003);cursor:pointer;transition:all .25s var(--ease);border:1px solid transparent}
.ep-item:active{background:rgba(139,92,246,0.006);border-color:rgba(139,92,246,0.03)}
.ep-num{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:rgba(139,92,246,0.01);font-weight:800;font-size:.65em;flex-shrink:0;color:var(--prim2);border:1px solid rgba(139,92,246,0.015)}
.ep-name{flex:1;font-size:.75em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.ep-arrow{font-size:.55em;opacity:0;transition:all .25s var(--ease);transform:translateX(-4px)}
.ep-item:active .ep-arrow,.ep-item:hover .ep-arrow{opacity:1;transform:translateX(0)}
.no-eps{grid-column:1/-1;text-align:center;padding:24px;color:var(--text3);font-size:.78em}

.browse-toolbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin:10px 0 12px}
.browse-select,.browse-input{background:rgba(255,255,255,0.006);color:var(--text2);border:1px solid rgba(139,92,246,0.02);padding:6px 10px;border-radius:var(--radius-xs);font-size:.72em;cursor:pointer;outline:none;transition:all .3s var(--ease);font-weight:500}
.browse-select:focus,.browse-input:focus{border-color:rgba(139,92,246,0.06)}
.browse-input{color:var(--text);direction:rtl;max-width:120px}
.browse-filters{background:rgba(139,92,246,0.004);border:1px solid rgba(139,92,246,0.02);border-radius:var(--radius);padding:14px;margin-bottom:16px;animation:slideD .25s var(--ease-spring)}
.filter-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.filter-group{display:flex;flex-direction:column;gap:2px}
.filter-group label{font-size:.55em;color:var(--text2);font-weight:700;letter-spacing:.3px}

.pagination{display:flex;justify-content:center;margin:20px 0 28px}
.pagination-inner{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.005);padding:4px;border-radius:60px;border:1px solid rgba(139,92,246,0.02);flex-wrap:wrap;justify-content:center}
.page-btn{background:none;border:none;color:var(--text2);padding:6px 16px;border-radius:60px;cursor:pointer;font-size:.75em;transition:all .25s var(--ease);font-weight:600}
.page-btn:active{background:rgba(139,92,246,0.02);color:var(--prim2)}
.page-current{font-size:.8em;font-weight:800;color:var(--prim2);background:rgba(139,92,246,0.02);padding:4px 12px;border-radius:60px;min-width:26px;text-align:center}

/* ── Player ── */
.player-overlay{position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,0.75);backdrop-filter:blur(50px);-webkit-backdrop-filter:blur(50px);display:flex;align-items:center;justify-content:center}
.player-overlay.show{animation:pIn .35s var(--ease)}
@keyframes pIn{from{opacity:0}to{opacity:1}}
.player-box{width:100%;max-width:960px;background:var(--bg2);border-radius:var(--radius);overflow:hidden;margin:8px;box-shadow:0 0 80px rgba(0,0,0,.6),0 0 200px rgba(139,92,246,0.03);border:1px solid rgba(139,92,246,0.02)}
.player-box.show{animation:pB .4s var(--ease-spring)}
@keyframes pB{from{opacity:0;transform:scale(.92) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.player-top{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.015)}
.player-top span{font-size:.78em;color:var(--text2);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-close{background:none;border:none;color:var(--text2);font-size:1.3em;cursor:pointer;padding:0 10px;line-height:1;transition:color .2s,transform .2s}
.player-close:hover{color:#fff;transform:rotate(90deg)}
.player-wrap{position:relative;width:100%;background:#000;cursor:pointer}
.player-wrap video,.player-wrap iframe{width:100%;display:block;max-height:40vh;background:#000;border:none}
.player-bar{display:flex;align-items:center;gap:4px;padding:6px 10px;background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.4) 100%);border-top:1px solid rgba(255,255,255,0.02);direction:ltr;position:relative}
.pbtn{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.005);color:var(--text2);font-size:.62em;padding:5px 8px;border-radius:var(--radius-xs);cursor:pointer;transition:all .25s var(--ease);white-space:nowrap;font-weight:500;min-width:28px;display:flex;align-items:center;justify-content:center;line-height:1}
.pbtn:hover{background:rgba(139,92,246,0.06);color:#fff;border-color:rgba(139,92,246,0.04)}
.pbtn:active{transform:scale(.92)}
.pbtn-play{background:rgba(139,92,246,0.08);border-color:rgba(139,92,246,0.04);font-size:.75em;min-width:36px;padding:5px 12px;color:var(--prim2);font-weight:700}
.pbtn-play:hover{background:rgba(139,92,246,0.12);color:#fff}
.pbtn-vol{min-width:32px;font-size:.7em}
.progress-wrap{flex:1;min-width:40px;padding:0 2px;display:flex;align-items:center;gap:6px}
.progress-wrap input{width:100%;height:4px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,0.04);border-radius:10px;outline:none;cursor:pointer;touch-action:none;transition:height .2s}
.progress-wrap input:hover{height:6px}
.progress-wrap input::-webkit-slider-thumb{-webkit-appearance:none;width:0;height:0;border-radius:50%;background:var(--grad2);cursor:pointer;transition:width .2s,height .2s}
.progress-wrap input:hover::-webkit-slider-thumb,.progress-wrap input:active::-webkit-slider-thumb{width:14px;height:14px;border:2px solid rgba(255,255,255,0.1)}
.time-display{font-size:.5em;color:var(--text2);min-width:48px;text-align:center;direction:ltr;font-variant-numeric:tabular-nums;user-select:none}
.pbtn-srv{font-size:.5em;padding:4px 6px;min-width:auto}
.pbtn-active{background:rgba(139,92,246,0.1);border-color:rgba(139,92,246,0.06);color:var(--prim2)}
.speed-menu{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:rgba(8,8,18,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(139,92,246,0.03);border-radius:var(--radius-xs);padding:4px;display:flex;gap:2px;margin-bottom:4px;animation:smIn .2s var(--ease-spring)}
@keyframes smIn{from{opacity:0;transform:translateX(-50%) translateY(4px) scale(.95)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
.speed-opt{padding:4px 10px;border:none;background:none;color:var(--text2);font-size:.6em;border-radius:4px;cursor:pointer;transition:all .2s;font-weight:500}
.speed-opt:hover{background:rgba(139,92,246,0.04);color:#fff}
.speed-opt.active{background:rgba(139,92,246,0.08);color:var(--prim2);font-weight:700}
.player-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:50%;width:60px;height:60px;display:flex;align-items:center;justify-content:center;font-size:1.5em;color:#fff;pointer-events:none;opacity:0;z-index:10}
.player-hint.show{animation:hintP .5s var(--ease)}
@keyframes hintP{0%{opacity:0;transform:translate(-50%,-50%) scale(.6)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}60%{opacity:1;transform:translate(-50%,-50%) scale(1)}to{opacity:0;transform:translate(-50%,-50%) scale(.8)}}

.loading{position:fixed;inset:0;z-index:2000;background:rgba(5,5,10,0.7);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);display:flex;flex-direction:column;align-items:center;justify-content:center}
.loading.show{animation:pIn .3s var(--ease)}

<script>
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
const isSmallScreen = window.innerWidth < 768;

const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [], stars = [];
let animId = null;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

if (!isMobile) {
  class Star {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.sz = Math.random() * 1.2 + 0.2;
      this.o = Math.random() * 0.4 + 0.1;
      this.phase = Math.random() * Math.PI * 2;
      this.speed = Math.random() * 0.003 + 0.001;
    }
  }

  class P {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.sz = Math.random() * 2.5 + 0.5;
      this.sx = (Math.random() - 0.5) * 0.2;
      this.sy = -(Math.random() * 0.15 + 0.03);
      this.o = Math.random() * 0.5 + 0.1;
      this.drift = Math.random() * 3;
      this.phase = Math.random() * Math.PI * 2;
      this.hue = Math.random() * 80 + 230;
      this.pulse = Math.random() * 0.02 + 0.01;
    }
  }

  const N = Math.min(100, Math.floor((W * H) / 16000));
  const SN = Math.min(80, Math.floor((W * H) / 25000));
  for (let i = 0; i < N; i++) particles.push(new P());
  for (let i = 0; i < SN; i++) stars.push(new Star());

  function drawParticles(t) {
    ctx.clearRect(0, 0, W, H);
    for (const s of stars) {
      const twinkle = 0.3 + 0.7 * Math.abs(Math.sin(t * s.speed + s.phase));
      ctx.globalAlpha = s.o * twinkle * 0.5;
      ctx.fillStyle = '#e0e0ff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.sz, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 6;
    ctx.shadowColor = 'rgba(139,92,246,0.3)';
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      p.x += p.sx + Math.sin(t * 0.0003 + p.drift) * 0.15;
      p.y += p.sy;
      const brightness = 0.4 + 0.6 * Math.abs(Math.sin(t * p.pulse * 2 + p.phase));
      ctx.globalAlpha = p.o * brightness;
      ctx.shadowBlur = 8 + brightness * 6;
      ctx.shadowColor = 'hsla(' + p.hue + ', 80%, 60%, 0.4)';
      ctx.fillStyle = 'hsl(' + p.hue + ', 90%, ' + (50 + brightness * 30) + '%)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.sz * (0.8 + brightness * 0.2), 0, Math.PI * 2);
      ctx.fill();
      for (let j = i + 1; j < particles.length; j++) {
        const p2 = particles[j];
        const dx = p.x - p2.x;
        const dy = p.y - p2.y;
        const dist = dx * dx + dy * dy;
        if (dist < 30000) {
          const alpha = (1 - dist / 30000) * 0.15 * brightness;
          ctx.globalAlpha = alpha;
          ctx.shadowBlur = 0;
          ctx.strokeStyle = 'hsla(' + ((p.hue + p2.hue) / 2) + ', 70%, 60%, 0.5)';
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.stroke();
        }
      }
      if (p.y < -10 || p.x < -10 || p.x > W + 10) p.reset();
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    animId = requestAnimationFrame(drawParticles);
  }
  drawParticles(0);
} else {
  canvas.style.display = 'none';
}

const $ = id => document.getElementById(id);
const si = $('si'), sb = $('sb');

const home = $('home'), sv = $('searchView'), sg = $('sg'), sc = $('sc');
const bv = $('browseView'), bg = $('bg'), bc = $('bc'), bp = $('bp');
const ev = $('epView'), en = $('ename'), ec1 = $('ec1'), ec2 = $('ec2'), el = $('elist'), epInp = $('epInp');
const backBtn = $('backBtn'), watchBtn = $('watchBtn'), sec = $('sections');
const ov = $('player'), pbox = $('pbox'), vid = $('vid'), ifr = $('ifr'), vsrc = $('vsrc'), pt = $('ptitle');
const pp = $('pplay'), pprevEp = $('pprevEp'), pnextEp = $('pnextEp');
const prev = $('prev'), next = $('next'), prog = $('prog'), td = $('tdisp'), pf = $('pfull'), pc = $('pclose');
const pvol = $('pvol'), volSlider = $('volSlider');
const pspeed = $('pspeed'), speedMenu = $('speedMenu');
const psrv = $('psrv'), pipBtn = $('pipBtn'), pwrap = $('pwrap'), playHint = $('playHint');
const ld = $('loading'), to = $('toast'), nav = $('nav'), stp = $('stop');

let slug = null, animeName = '', eps = [], urls = [], timer = null, bPage = 1;
let _currentEp = 1, _totalEps = 0;

window.addEventListener('scroll', () => {
  const y = window.scrollY;
  nav.classList.toggle('scrolled', y > 30);
  stp.classList.toggle('show', y > 400);
});
stp.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

function toast(msg, t = 'err') {
  to.textContent = msg;
  to.className = 'toast ' + t + ' show';
  clearTimeout(to._h);
  to._h = setTimeout(() => to.classList.remove('show'), 3500);
}
function ldShow() { ld.classList.remove('hidden'); ld.classList.add('show'); }
function ldHide() { ld.classList.add('hidden'); ld.classList.remove('show'); }

const obs = new IntersectionObserver(ents => {
  ents.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.06 });
function ob(el) { el && obs.observe(el); }

function card(it, d = 0) {
  const img = it.image || '';
  const t = it.title || '?';
  const tp = it.type || 'أنمي';
  const yr = it.year || '';
  const r = it.rating ? parseFloat(it.rating).toFixed(1) : null;
  const s = it.slug || '';
  const fb = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 280'%3E%3Crect fill='%23131324' width='200' height='280'/%3E%3Ctext x='100' y='140' text-anchor='middle' fill='%2394a3b8' font-size='24'%3E${t.charAt(0)}%3C/text%3E%3C/svg%3E`;
  return `<div class="anime-card glow-border" onclick="pick('${s}','${img.replace(/'/g,"\\'")}','${t.replace(/'/g,"\\'")}','${tp}','${yr}','${r||''}')">
    <img class="thumb" src="${img}" alt="${t}" loading="lazy" onerror="this.src='${fb}'">
    <div class="overlay"><span class="play">▶</span></div>
    ${r ? `<div class="rating">${r}</div>` : ''}
    <div class="info"><div class="title">${t}</div><div class="meta"><span>${tp}</span>${yr ? `<span>${yr}</span>` : ''}</div></div>
  </div>`;
}

function skel(n = 8) {
  return '<div class="card-row">' + Array(n).fill('<div class="skel-card"><div class="img"></div><div class="l1"></div><div class="l2"></div></div>').join('') + '</div>';
}

function showView(v) {
  [home, sv, bv, ev].forEach(x => x.classList.add('hidden'));
  v.classList.remove('hidden');
  v.classList.remove('view');
  void v.offsetWidth;
  v.classList.add('view');
}

function loadHome() {
  sec.innerHTML = '<div class="sec"><div class="sec-header"><h2>جاري التحميل...</h2></div>' + skel(8) + '</div>';
  const ft = setTimeout(() => {
    sec.innerHTML = '<div class="err-state">جاري تحميل المحتوى... يرجى الانتظار</div>';
  }, 8000);
  fetch('/api/homepage').then(r => r.json()).then(d => {
    clearTimeout(ft);
    sec.innerHTML = '';
    const sections = Array.isArray(d) ? d : [];
    let hasAny = false;
    sections.forEach(s => {
      const items = s.items;
      if (!items || !items.length) return;
      hasAny = true;
      const el = document.createElement('section');
      el.className = 'sec'; el.setAttribute('data-animate','');
      el.innerHTML = `<div class="sec-header"><h2>${s.label}</h2><span class="sec-badge">${items.length}</span></div>
        <div class="card-row">${items.map((x,i) => card(x,i*35)).join('')}</div>`;
      sec.appendChild(el);
      ob(el);
    });
    if (!hasAny) sec.innerHTML = '<div class="err-state">لا توجد بيانات متاحة</div>';
  }).catch(() => { clearTimeout(ft); sec.innerHTML = '<div class="err-state">تعذر التحميل</div>'; });
}

function doSearch(q) {
  if (!q) { toast('أدخل اسم الأنمي'); return; }
  ldShow();
  fetch('/api/search', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title:q}) })
    .then(r => r.json()).then(d => {
      ldHide();
      if (d.found && d.results.length) {
        showView(sv); sc.textContent = d.results.length;
        sg.innerHTML = d.results.map((x,i) => card(x,i*35)).join('');
        sv.scrollIntoView({ behavior:'smooth', block:'start' });
      } else {
        showView(sv); sg.innerHTML = '<div class="err-state">لا توجد نتائج</div>'; sc.textContent = '0';
      }
    }).catch(() => { ldHide(); toast('خطأ في الاتصال'); });
}

sb.addEventListener('click', () => doSearch(si.value.trim()));
si.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(si.value.trim()); });

const bBtn = $('browseBtn'), brf = $('brf'), bsort = $('bsort'), bkw = $('bkw');
const bfbtn = $('bfbtn'), bf = $('bfilters'), fseason = $('fseason'), ftype = $('ftype');
const fstat = $('fstat'), fyear = $('fyear'), fap = $('fap'), fres = $('fres');

const menuBtn = $('menuBtn'), mobileMenu = $('mobileMenu'), mmBrowse = $('mmBrowse');
menuBtn.addEventListener('click', () => {
  mobileMenu.classList.toggle('hidden');
  menuBtn.textContent = mobileMenu.classList.contains('hidden') ? '☰' : '✕';
});
mobileMenu.addEventListener('click', e => { if (e.target.tagName === 'BUTTON') { mobileMenu.classList.add('hidden'); menuBtn.textContent = '☰'; } });
document.addEventListener('click', e => { if (!e.target.closest('nav')) { mobileMenu.classList.add('hidden'); if(menuBtn) menuBtn.textContent = '☰'; } });
mmBrowse.addEventListener('click', () => loadBrowse(1));

bBtn.addEventListener('click', () => loadBrowse(1));
brf.addEventListener('click', () => loadBrowse(bPage));
bsort.addEventListener('change', () => loadBrowse(1));
bkw.addEventListener('keydown', e => { if (e.key === 'Enter') loadBrowse(1); });
bfbtn.addEventListener('click', () => bf.classList.toggle('hidden'));
fap.addEventListener('click', () => loadBrowse(1));
fres.addEventListener('click', () => { fseason.value = ftype.value = fstat.value = fyear.value = ''; bkw.value = ''; loadBrowse(1); });

function loadBrowse(p) {
  bPage = p; ldShow();
  const q = new URLSearchParams({ page: p, order_by: bsort.value });
  if (bkw.value.trim()) q.set('keyword', bkw.value.trim());
  if (fseason.value) q.set('season', fseason.value);
  if (ftype.value) q.set('type', ftype.value);
  if (fstat.value) q.set('status', fstat.value);
  if (fyear.value) q.set('year', fyear.value);
  fetch('/api/browse?'+q).then(r=>r.json()).then(d => {
    ldHide();
    if (d.success) {
      showView(bv); bc.textContent = d.total_min || (d.data||[]).length;
      bg.innerHTML = (d.data||[]).map((x,i) => card({ title: x.anime_name, slug: x.slug, image: x.anime_cover_image_url, type: x.anime_type, year: x.anime_release_year, rating: x.anime_rating }, i*30)).join('');
      bp.innerHTML = '';
      if (d.has_next || d.has_prev) {
        const w = document.createElement('div'); w.className = 'pagination-inner';
        if (d.has_prev) { const b = document.createElement('button'); b.className='page-btn'; b.textContent='← السابق'; b.onclick=()=>loadBrowse(p-1); w.appendChild(b); }
        const c = document.createElement('span'); c.className='page-current'; c.textContent=p; w.appendChild(c);
        if (d.has_next) { const b = document.createElement('button'); b.className='page-btn'; b.textContent='التالي →'; b.onclick=()=>loadBrowse(p+1); w.appendChild(b); }
        bp.appendChild(w);
      }
      bv.scrollIntoView({ behavior:'smooth', block:'start' });
    } else toast(d.error||'فشل');
  }).catch(() => { ldHide(); toast('خطأ'); });
}

function pick(s, img, title, tp, yr, rt) {
  slug = s; animeName = '';
  _currentEp = 1; _totalEps = 0;
  ldShow();
  window._animeMeta = { image: img || '', title: title || '', type: tp || '', year: yr || '', rating: rt || '' };
  let timedOut = false;
  const ft = setTimeout(() => { timedOut = true; toast('الخادم يستغرق وقتاً طويلاً، جرب تاني'); }, 12000);
  fetch('/api/episodes', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({slug:s}) })
    .then(r=>r.json()).then(d => {
      clearTimeout(ft);
      if (timedOut) return;
      ldHide();
      if (d.found) { eps = d.episodes||[]; animeName = d.name||''; _totalEps = eps.length; showEps(); }
      else toast(d.message||'تعذر التحميل');
    }).catch(() => { clearTimeout(ft); ldHide(); toast('خطأ'); });
}

function showEps() {
  const name = animeName || slug.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  showView(ev);
  const meta = window._animeMeta || {};
  en.textContent = name;
  $('epImg').src = meta.image || '';
  $('epImg').alt = name;
  $('epType').textContent = '\uD83D\uDCFA ' + (meta.type || 'أنمي');
  $('epYear').textContent = '\uD83D\uDCC5 ' + (meta.year || '--');
  $('epRating').textContent = '\u2B50 ' + (meta.rating || '--');
  ec1.textContent = (eps.length||'?')+' حلقة'; ec2.textContent = eps.length||'0';
  if (!eps.length) { el.innerHTML = '<div class="no-eps">لا توجد حلقات</div>'; return; }
  el.innerHTML = eps.map((e,i) => { const en = e.n || e.number || e.episode_number || e.num || e.episode || (i+1); return `<div class="ep-item" onclick="playEp(${en})"><span class="ep-num">${en}</span><span class="ep-name">${e.title||'حلقة '+en}</span><span class="ep-arrow">▶</span></div>`; }).join('');
  epInp.max = eps.length;
  ev.scrollIntoView({ behavior:'smooth', block:'start' });
}

backBtn.addEventListener('click', () => {
  ev.classList.add('hidden');
  if (!bv.classList.contains('hidden')) bv.scrollIntoView({ behavior:'smooth' });
  else if (!sv.classList.contains('hidden')) sv.scrollIntoView({ behavior:'smooth' });
  else home.scrollIntoView({ behavior:'smooth' });
});

watchBtn.addEventListener('click', () => playEp());
epInp.addEventListener('keydown', e => { if (e.key === 'Enter') playEp(); });

function playEp(ep) {
  const n = ep || parseInt(epInp.value);
  if (!n || n<1) { toast('رقم صحيح'); return; }
  if (!slug) { toast('اختر أنمي'); return; }
  _currentEp = n;
  ldShow();
  let timedOut = false;
  const ft = setTimeout(() => { timedOut = true; toast('جلب الرابط يستغرق وقتاً، جرب تاني'); }, 15000);
  fetch('/api/play', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({slug, episode:n}) })
    .then(r=>r.json()).then(d => {
      clearTimeout(ft);
      if (timedOut) return;
      ldHide();
      if (d.found && d.urls.length) { urls = d.urls; openS(0); }
      else toast(d.message||'لا توجد روابط');
    }).catch(() => { clearTimeout(ft); ldHide(); toast('خطأ'); });
}

var _hls = null;
function loadHlsStream(url, videoEl, cb) {
  if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
    videoEl.src = url; videoEl.load(); if (cb) cb(true);
    return;
  }
  if (window.Hls && Hls.isSupported()) {
    videoEl.src = '';
    if (_hls) _hls.destroy();
    _hls = new Hls();
    _hls.loadSource(url);
    _hls.attachMedia(videoEl);
    _hls.on(Hls.Events.MANIFEST_PARSED, function() { if (cb) cb(true); });
    return;
  }
  if (document.querySelector('script[src*="hls.js"]')) return;
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/hls.js@latest';
  s.onload = function() {
    if (window.Hls && Hls.isSupported()) {
      videoEl.src = '';
      if (_hls) _hls.destroy();
      _hls = new Hls();
      _hls.loadSource(url);
      _hls.attachMedia(videoEl);
      _hls.on(Hls.Events.MANIFEST_PARSED, function() { if (cb) cb(true); });
    } else if (cb) cb(false);
  };
  s.onerror = function() { if (cb) cb(false); };
  document.head.appendChild(s);
}

function openS(idx) {
  if (idx >= urls.length) { toast('كل السيرفرات متعطلة'); closeP(); return; }
  clearTimeout(timer);
  const e = urls[idx];
  const pName = animeName || slug.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  pt.textContent = pName + ' — ' + e.server;
  ov.classList.remove('hidden'); ov.classList.add('show');
  pbox.classList.remove('hidden'); pbox.classList.add('show');

  if (e.url.includes('mega.nz')) {
    vid.classList.add('hidden'); ifr.classList.remove('hidden'); ifr.src = e.url;
    return;
  }
  ifr.classList.add('hidden'); ifr.src = '';
  vid.classList.remove('hidden');

  const isM3u8 = e.url.includes('.m3u8');
  if (isM3u8) {
    loadHlsStream(e.url, vid, function(ok) {
      if (!ok) { toast('هذا السيرفر غير متوافق'); openS(idx+1); return; }
      startPlayback(true);
    });
    if (document.querySelector('script[src*="hls.js"]') && !window.Hls) {
      toast('جاري تحميل مشغل HLS...');
    }
    upBtn();
    return;
  }

  vsrc.src = e.url; vid.load();
  startPlayback(false);
  function startPlayback(hls) {
    vid.currentTime = 0; upBtn(); vid.play().catch(()=>{});
    if (!hls) {
      timer = setTimeout(function() {
        if (vid.readyState < 3) { vid.pause(); vsrc.src=''; vid.load(); toast('بطيء، تجربة التالي...'); openS(idx+1); }
      }, 15000);
    }
  }
}

vid.addEventListener('playing', () => clearTimeout(timer));

function upBtn() { pp.textContent = vid.paused ? '▶' : '⏸'; }
pp.addEventListener('click', () => { vid.paused ? vid.play() : vid.pause(); });
vid.addEventListener('play', upBtn);
vid.addEventListener('pause', upBtn);

// Click on video to toggle play/pause
pwrap.addEventListener('click', (e) => {
  if (e.target === pwrap || e.target === vid) {
    vid.paused ? vid.play() : vid.pause();
    playHint.textContent = vid.paused ? '⏸' : '▶';
    playHint.classList.remove('show');
    void playHint.offsetWidth;
    playHint.classList.add('show');
  }
});

prev.addEventListener('click', () => { vid.currentTime = Math.max(0, vid.currentTime-10); });
next.addEventListener('click', () => { vid.currentTime = Math.min(vid.duration||0, vid.currentTime+10); });

// Volume control
pvol.addEventListener('click', () => {
  vid.muted = !vid.muted;
  pvol.textContent = vid.muted ? '🔇' : (vid.volume > 0.5 ? '🔊' : (vid.volume > 0 ? '🔉' : '🔈'));
  volSlider.value = vid.muted ? 0 : vid.volume * 100;
});
volSlider.addEventListener('input', () => {
  const v = volSlider.value / 100;
  vid.volume = v;
  vid.muted = v === 0;
  pvol.textContent = v === 0 ? '🔇' : (v > 0.5 ? '🔊' : '🔉');
  volSlider.style.background = 'linear-gradient(to right,var(--prim2) 0%,var(--prim2) '+volSlider.value+'%,rgba(255,255,255,0.04) '+volSlider.value+'%,rgba(255,255,255,0.04) 100%)';
});

function upProg() {
  if (!vid.duration) return;
  const pct = (vid.currentTime/vid.duration)*100;
  prog.value = pct*10;
  td.textContent = fmt(vid.currentTime)+' / '+fmt(vid.duration);
  prog.style.background = 'linear-gradient(to right,var(--prim2) 0%,var(--prim2) '+pct+'%,rgba(255,255,255,0.008) '+pct+'%,rgba(255,255,255,0.008) 100%)';
}
vid.addEventListener('timeupdate', upProg);
prog.addEventListener('input', () => {
  if (!vid.duration) return;
  const pct = (prog.value/1000)*100;
  vid.currentTime = (prog.value/1000)*vid.duration;
  prog.style.background = 'linear-gradient(to right,var(--prim2) 0%,var(--prim2) '+pct+'%,rgba(255,255,255,0.008) '+pct+'%,rgba(255,255,255,0.008) 100%)';
});

// Playback speed
pspeed.addEventListener('click', (e) => {
  e.stopPropagation();
  speedMenu.classList.toggle('hidden');
});
speedMenu.querySelectorAll('.speed-opt').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const speed = parseFloat(btn.dataset.speed);
    vid.playbackRate = speed;
    pspeed.textContent = speed + '×';
    speedMenu.querySelectorAll('.speed-opt').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    speedMenu.classList.add('hidden');
  });
});
document.addEventListener('click', () => { if (!speedMenu.classList.contains('hidden')) speedMenu.classList.add('hidden'); });

// Picture in Picture
pipBtn.addEventListener('click', () => {
  if (document.pictureInPictureElement) {
    document.exitPictureInPicture();
  } else if (vid.classList.contains('hidden')) {
    toast('غير متاح للإطارات المضمنة');
  } else {
    vid.requestPictureInPicture().catch(() => toast('غير مدعوم'));
  }
});

// Server switcher
psrv.addEventListener('click', () => {
  if (urls.length <= 1) { toast('لا توجد سيرفرات أخرى'); return; }
  const currentIdx = urls.findIndex(u => u.url === (vid.src || (ifr.src && ifr.src)));
  const nextIdx = (currentIdx + 1) % urls.length;
  toast('جاري التبديل إلى ' + urls[nextIdx].server, 'ok');
  closeP_reset = false;
  openS(nextIdx);
});

// Fullscreen
pf.addEventListener('click', () => {
  const el = vid.classList.contains('hidden') ? ifr : vid;
  if (!document.fullscreenElement) { (el.requestFullscreen||el.webkitRequestFullscreen)?.call(el); }
  else { (document.exitFullscreen||document.webkitExitFullscreen)?.call(document); }
});

// Episode navigation in player
pprevEp.addEventListener('click', () => {
  if (_currentEp > 1) { closeP(); playEp(_currentEp - 1); }
  else toast('هذه أول حلقة');
});
pnextEp.addEventListener('click', () => {
  if (_currentEp < _totalEps) { closeP(); playEp(_currentEp + 1); }
  else toast('هذه آخر حلقة');
});

pc.addEventListener('click', closeP);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeP(); return; }
  if (!ov.classList.contains('hidden') && !vid.classList.contains('hidden')) {
    if (e.key === ' ' || e.key === 'Space') { e.preventDefault(); vid.paused ? vid.play() : vid.pause(); }
    if (e.key === 'ArrowLeft') { vid.currentTime = Math.max(0, vid.currentTime-10); }
    if (e.key === 'ArrowRight') { vid.currentTime = Math.min(vid.duration||0, vid.currentTime+10); }
    if (e.key === 'ArrowUp') { vid.volume = Math.min(1, vid.volume + 0.1); volSlider.value = vid.volume * 100; pvol.textContent = '🔊'; }
    if (e.key === 'ArrowDown') { vid.volume = Math.max(0, vid.volume - 0.1); volSlider.value = vid.volume * 100; pvol.textContent = vid.volume === 0 ? '🔇' : '🔉'; }
    if (e.key === 'm' || e.key === 'M') { pvol.click(); }
    if (e.key === 'f' || e.key === 'F') { pf.click(); }
    if (e.key === 'p' || e.key === 'P') { pipBtn.click(); }
  }
});

let closeP_reset = true;
function closeP() {
  if (_hls) { _hls.destroy(); _hls = null; }
  vid.pause(); vid.currentTime=0; vid.src=''; vid.load(); ifr.src='';
  ov.classList.remove('show'); ov.classList.add('hidden');
  pbox.classList.add('hidden');
  pbox.classList.remove('show');
  clearTimeout(timer);
  if (document.fullscreenElement) document.exitFullscreen?.();
  if (document.pictureInPictureElement) document.exitPictureInPicture();
}
function fmt(s) { if (isNaN(s)) return '0:00'; const m=Math.floor(s/60), sec=Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }

document.addEventListener('DOMContentLoaded', loadHome);
</script>
</body>
</html>
